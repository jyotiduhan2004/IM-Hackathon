name: Claude Code Review

on:
  pull_request:
    # On-demand only: apply the `run-claude-review` label to trigger.
    # Prevents auto-spamming every PR (which gets noisy on prototype repos
    # with many small, mechanical commits).
    types: [labeled]

jobs:
  claude-review:
    if: github.event.label.name == 'run-claude-review'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'

      - name: Clear trigger label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label "run-claude-review"
