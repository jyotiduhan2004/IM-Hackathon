name: pre-commit

# Run the hooks defined in .pre-commit-config.yaml on every PR and push to
# main. Uses the official pre-commit/action maintained by the pre-commit
# project (https://github.com/pre-commit/action).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
