name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Restrict to repo members so external drive-by comments can't burn minutes
    # or nudge Claude to push commits on our behalf.
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      # Write perms so Claude can push fix-up commits and comment back on PRs
      # when asked (e.g. "@claude address codex's P1 feedback").
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Let Claude see CI results when iterating on PRs.
          additional_permissions: |
            actions: read

          # Explicit allowlist for shell-ish ops. Colon-syntax matches
          # multi-line commit messages correctly (action defaults are too
          # restrictive when Claude needs to do a real commit-and-push loop).
          claude_args: '--allowedTools "Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git add:*),Bash(git reset:*),Bash(git commit:*),Bash(git push:*),Bash(gh:*)"'
