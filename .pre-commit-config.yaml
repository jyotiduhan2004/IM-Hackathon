# Pre-commit hooks — run locally via `pre-commit install` and on every PR
# via `.github/workflows/pre-commit.yml`.
#
# Scope kept intentionally small: just the two hooks that would have
# caught the 2026-04-15 incident (unresolved `<<<<<<< HEAD` shipped to main
# in `scripts/compile_all.py`). Broader hygiene hooks (whitespace, EOF,
# YAML strict parsing) are deferred — they'd churn the corpus on a first
# pass and aren't directly tied to any incident we've hit yet.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-ast

  # Local hygiene hooks — stdlib-only scripts, see scripts/check_*.py.
  - repo: local
    hooks:
      - id: check-file-sizes
        name: check file sizes
        entry: python scripts/check_file_sizes.py
        language: system
        pass_filenames: false
        files: ^(src|scripts)/.*\.py$
      - id: check-duplicate-fixtures
        name: check duplicate test fixtures
        entry: python scripts/check_duplicate_fixtures.py
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$
      - id: check-one-shot-expiry
        name: check one-shot script expiry
        entry: python scripts/check_one_shot_expiry.py
        language: system
        pass_filenames: false
        files: ^scripts/.*\.py$
