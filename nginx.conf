server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json application/xml text/xml text/html image/svg+xml;

    location ~* \.(css|js|woff2|woff|ttf|svg|ico|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
