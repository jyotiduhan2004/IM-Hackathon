site_name: Email Knowledge Base
site_description: Living knowledge base compiled from email
site_url: http://localhost:8000

docs_dir: wiki

use_directory_urls: true

# Explicit top-level reader navigation. Individual topic/system/policy/
# entity pages still auto-render under their section via the landing-page
# index files — but the main nav is curated by hand, not a filesystem dump.
# See docs/issues/10-phase1-implementation-plan.md (Workstream 2).
nav:
  - Home: index.md
  - Domains:
      - domains/index.md
  - Topics:
      - topics/index.md
  - Products & Platforms:
      - systems/index.md
  - Policies:
      - policies/index.md
  - Changes: changes.md
  - About:
      - about.md
      - Compile status: compile-status.md

# Exclude draft pages from the build (anticipates the _drafts/ folder
# added by the drafts-review workstream).
exclude_docs: |
  _drafts/**

# Hide the drafts queue entirely from the published site. Draft pages live in
# wiki/_drafts/ for operator review and must never appear in nav or build output.
exclude_docs: |
  _drafts/**

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      # Render ```mermaid``` fences as Mermaid diagrams. Without this,
      # ` ```mermaid pie ... ``` ` blocks render as plain code, not charts
      # — which is why the compile-status pie was just text.
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

hooks:
  - mkdocs_hooks.py  # Appends "## Sources" from frontmatter to every page

plugins:
  - search
  - tags
  - roamlinks  # Renders [[wikilinks]] as clickable markdown links

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/indiamart-ai/email-knowledge-base

extra_css:
  - stylesheets/extra.css

# Suppress warnings for pages referenced via [[wikilinks]] that MkDocs doesn't
# natively understand — we render them as plain text (Phase 2 will add a plugin)
strict: false
